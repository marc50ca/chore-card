complete_task:
  name: Complete Task
  description: Mark a task as completed and schedule next recurrence if applicable.
  fields:
    task_id:
      name: Task ID
      description: The unique ID of the task to complete.
      required: true
      selector:
        text:
    completed_by:
      name: Completed By
      description: Home Assistant username of who completed the task.
      required: false
      selector:
        text:

complete_by_nfc:
  name: Complete Task by NFC
  description: Complete a task by providing the NFC tag ID. Use this as the action in NFC tag automations.
  fields:
    nfc_tag_id:
      name: NFC Tag ID
      description: The NFC tag ID as returned by the Home Assistant tag scanner.
      required: true
      selector:
        text:
    completed_by:
      name: Completed By
      description: Home Assistant username or device ID of who scanned the tag.
      required: false
      selector:
        text:

add_task:
  name: Add Task
  description: Create a new chore or task.
  fields:
    name:
      name: Name
      description: The task name.
      required: true
      selector:
        text:
    description:
      name: Description
      description: Optional task description.
      selector:
        text:
    category:
      name: Category
      description: Task category (cleaning, cooking, laundry, shopping, etc.)
      selector:
        text:
    priority:
      name: Priority
      description: "Task priority: low, medium, high, or urgent."
      default: medium
      selector:
        select:
          options: [low, medium, high, urgent]
    due_date:
      name: Due Date
      description: Due date in YYYY-MM-DD format.
      selector:
        text:
    recurrence:
      name: Recurrence
      description: "Repeat schedule: none, daily, weekly, bi_weekly, monthly, bi_monthly, yearly, day_of_week, day_of_month_position."
      default: none
      selector:
        select:
          options:
            - none
            - daily
            - weekly
            - bi_weekly
            - monthly
            - bi_monthly
            - yearly
            - day_of_week
            - day_of_month_position
    recurrence_day:
      name: Recurrence Day
      description: "Day of week for day_of_week/day_of_month_position recurrence. 0=Monday, 6=Sunday."
      selector:
        number:
          min: 0
          max: 6
    recurrence_week_position:
      name: Week Position
      description: "Week position in month for day_of_month_position recurrence. 1=first, 2=second, 3=third, 4=fourth, -1=last."
      selector:
        number:
          min: -1
          max: 4
    assigned_to:
      name: Assigned To
      description: List of Home Assistant usernames to assign this task to.
      selector:
        text:
    nfc_tag_id:
      name: NFC Tag ID
      description: Associate an NFC tag ID for tap-to-complete functionality.
      selector:
        text:
    notes:
      name: Notes
      description: Additional notes for this task.
      selector:
        text:

update_task:
  name: Update Task
  description: Update an existing task's properties.
  fields:
    task_id:
      name: Task ID
      description: The unique ID of the task to update.
      required: true
      selector:
        text:
    name:
      name: Name
      selector:
        text:
    category:
      name: Category
      selector:
        text:
    priority:
      name: Priority
      selector:
        select:
          options: [low, medium, high, urgent]
    due_date:
      name: Due Date
      selector:
        text:
    recurrence:
      name: Recurrence
      selector:
        text:
    assigned_to:
      name: Assigned To
      selector:
        text:
    status:
      name: Status
      selector:
        select:
          options: [pending, in_progress, completed, skipped]

delete_task:
  name: Delete Task
  description: Permanently delete a task.
  fields:
    task_id:
      name: Task ID
      required: true
      selector:
        text:

skip_task:
  name: Skip Task
  description: Skip the current occurrence of a recurring task and advance to the next due date.
  fields:
    task_id:
      name: Task ID
      required: true
      selector:
        text:

assign_nfc_tag:
  name: Assign NFC Tag
  description: Associate an NFC tag with a task for tap-to-complete functionality.
  fields:
    task_id:
      name: Task ID
      required: true
      selector:
        text:
    nfc_tag_id:
      name: NFC Tag ID
      required: true
      selector:
        text:

snooze_task:
  name: Snooze Task
  description: Snooze a task by pushing its due date forward by a number of days.
  fields:
    task_id:
      name: Task ID
      required: true
      selector:
        text:
    days:
      name: Days
      description: Number of days to snooze (1–365).
      default: 1
      selector:
        number:
          min: 1
          max: 365
